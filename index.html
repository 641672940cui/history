<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
    <title>东东的历史题库</title>
    <style>
        :root {
            --bg: #fff8f0;
            --card: #ffffff;
            --border: #e8d5c0;
            --accent: #e07b3c;
            --accent2: #f4a261;
            --correct: #2d8a4e;
            --wrong: #e74c3c;
            --gold: #f0c060;
            --tag-bg: #fff0e0;
            --shadow: 0 2px 12px rgba(120, 70, 20, 0.06);
            --radius: 16px;
            --font-main: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
            --font-serif: 'Noto Serif SC', 'STSong', 'SimSun', 'KaiTi', serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background: linear-gradient(180deg, #fef5e7 0%, #fdebd0 30%, #fef9f3 100%);
            min-height: 100vh;
            padding-bottom: 80px;
            color: #3d2b1a;
            line-height: 1.6;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }

        /* ========== 头部 ========== */
        .app-header {
            background: linear-gradient(135deg, #e07b3c 0%, #c96a2d 40%, #b8551f 100%);
            color: #fff;
            padding: 1rem 1.2rem;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 3px 18px rgba(180, 80, 20, 0.25);
            border-bottom: 3px solid #f0c060;
            border-radius: 0 0 20px 20px;
        }
        .app-header h1 {
            font-family: var(--font-serif);
            font-size: 1.5rem;
            letter-spacing: 2px;
            font-weight: 700;
            margin: 0;
        }
        .app-header .subtitle {
            font-size: 0.75rem;
            opacity: 0.9;
            letter-spacing: 1px;
            margin-top: 2px;
        }
        .header-emoji {
            font-size: 1.8rem;
            display: block;
            margin-bottom: 2px;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-6px);
            }
        }

        /* ========== 底部导航 ========== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fffef9;
            border-top: 2px solid #f0dcc0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            height: 62px;
            z-index: 100;
            box-shadow: 0 -2px 12px rgba(0, 0, 0, 0.04);
            border-radius: 18px 18px 0 0;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            font-size: 0.7rem;
            color: #9b7b5c;
            cursor: pointer;
            padding: 0.35rem 0.7rem;
            border-radius: 20px;
            transition: all 0.2s;
            min-width: 55px;
            position: relative;
            font-weight: 500;
            user-select: none;
        }
        .nav-item.active {
            color: #c96a2d;
            font-weight: 700;
            background: #fff0e0;
            transform: translateY(-3px);
        }
        .nav-item .icon {
            font-size: 1.35rem;
            transition: transform 0.2s;
        }
        .nav-item.active .icon {
            transform: scale(1.15);
        }
        .badge-count {
            position: absolute;
            top: 0px;
            right: 2px;
            background: #e74c3c;
            color: #fff;
            font-size: 0.65rem;
            min-width: 17px;
            height: 17px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            padding: 0 4px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
        }

        /* ========== 主内容区 ========== */
        .main-content {
            max-width: 600px;
            margin: 0 auto;
            padding: 0.8rem 0.8rem 1rem;
        }
        .view {
            display: none;
        }
        .view.active {
            display: block;
            animation: fadeInUp 0.35s ease;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ========== 分区卡片 ========== */
        .section-card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin-bottom: 0.9rem;
            overflow: hidden;
            border: 1.5px solid #f0dcc0;
            transition: all 0.2s;
        }
        .section-card:active {
            transform: scale(0.995);
        }
        .section-header {
            background: linear-gradient(135deg, #fff8f0, #fff0e0);
            padding: 0.8rem 1rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f0dcc0;
            font-weight: 700;
            font-size: 0.95rem;
            color: #5c3418;
            user-select: none;
            gap: 0.5rem;
        }
        .section-header .header-left {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex: 1;
            min-width: 0;
        }
        .section-header .header-left span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .section-header .progress-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ddd;
            flex-shrink: 0;
        }
        .section-header .progress-dot.done {
            background: #2d8a4e;
        }
        .section-header .arrow {
            transition: transform 0.3s;
            font-size: 0.9rem;
            flex-shrink: 0;
            color: #c96a2d;
        }
        .section-header.expanded .arrow {
            transform: rotate(90deg);
        }
        .section-body {
            padding: 0.6rem 0.8rem 0.8rem;
            display: none;
        }
        .section-body.show {
            display: block;
        }
        .section-stats {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin: 0.5rem 0;
            font-size: 0.75rem;
            color: #7a5c3e;
        }
        .section-stats span {
            background: #fff5ea;
            padding: 0.3rem 0.7rem;
            border-radius: 12px;
            border: 1px solid #f0dcc0;
            font-weight: 500;
        }

        /* ========== 分页 ========== */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.3rem;
            flex-wrap: wrap;
            margin: 0.8rem 0 0.3rem;
        }
        .page-btn {
            min-width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 2px solid #f0c060;
            background: #fffef9;
            color: #c96a2d;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            user-select: none;
        }
        .page-btn.active {
            background: #e07b3c;
            color: #fff;
            border-color: #e07b3c;
            box-shadow: 0 2px 8px rgba(224, 123, 60, 0.3);
        }
        .page-btn:disabled {
            opacity: 0.35;
            pointer-events: none;
        }
        .page-btn:active:not(:disabled) {
            transform: scale(0.9);
        }

        /* ========== 题目卡片 ========== */
        .question-card {
            background: #fffef9;
            border: 1.5px solid #f0e0cc;
            border-radius: 12px;
            padding: 0.8rem 0.9rem;
            margin-bottom: 0.7rem;
            transition: all 0.25s;
        }
        .question-card.correct-card {
            border-color: #2d8a4e;
            background: #f2faf5;
            box-shadow: 0 0 0 3px rgba(45, 138, 78, 0.08);
        }
        .question-card.wrong-card {
            border-color: #e74c3c;
            background: #fef7f6;
            box-shadow: 0 0 0 3px rgba(231, 76, 60, 0.06);
        }
        .q-text {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            color: #2d1f0f;
            font-family: var(--font-serif);
            line-height: 1.5;
        }
        .option-label {
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
            padding: 0.55rem 0.6rem;
            margin: 0.2rem 0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s;
            border: 1.5px solid transparent;
            font-size: 0.85rem;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            background: #fefcf8;
        }
        .option-label:active {
            background: #fff5ea;
            border-color: #f0c060;
        }
        .option-label input {
            margin-top: 2px;
            accent-color: #e07b3c;
            min-width: 16px;
            height: 16px;
            pointer-events: none;
        }
        .option-label.selected {
            background: #fff5ea;
            border-color: #f0a040;
            font-weight: 600;
        }
        .option-label.correct-answer {
            background: #d4f0dd;
            border-color: #2d8a4e;
            color: #1a4d28;
            font-weight: 700;
        }
        .option-label.wrong-answer {
            background: #fde0dc;
            border-color: #e74c3c;
            color: #7a1a1a;
            font-weight: 600;
        }
        .feedback-msg {
            margin-top: 0.5rem;
            padding: 0.5rem 0.7rem;
            border-radius: 10px;
            font-size: 0.8rem;
            display: none;
            animation: fadeIn 0.3s;
            line-height: 1.5;
        }
        .feedback-msg.show {
            display: block;
        }
        .feedback-msg.correct-fb {
            background: #e6f7ec;
            color: #1a4d28;
            border: 1px solid #b8dcc5;
        }
        .feedback-msg.wrong-fb {
            background: #fef0ef;
            color: #7a1a1a;
            border: 1px solid #f5c6c0;
        }
        .encourage {
            font-weight: 700;
            font-size: 0.9rem;
            display: inline-block;
            margin-right: 0.3rem;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-4px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ========== 材料题样式 ========== */
        .material-box {
            background: #fef9f2;
            border-left: 4px solid #e07b3c;
            padding: 0.8rem 1rem;
            margin: 0.5rem 0 0.8rem;
            border-radius: 0 10px 10px 0;
            font-family: var(--font-serif);
            font-size: 0.85rem;
            white-space: pre-line;
            color: #3d2b1a;
            line-height: 1.7;
        }
        .step-badge {
            display: inline-block;
            background: #f0c060;
            color: #5c3418;
            padding: 0.3rem 0.8rem;
            border-radius: 15px;
            font-weight: 700;
            font-size: 0.78rem;
            margin: 0.4rem 0;
        }
        .btn {
            background: #e07b3c;
            color: #fff;
            border: none;
            padding: 0.55rem 1.3rem;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.85rem;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
            min-height: 40px;
            box-shadow: 0 2px 8px rgba(224, 123, 60, 0.2);
        }
        .btn:active {
            transform: scale(0.94);
            box-shadow: 0 1px 4px rgba(224, 123, 60, 0.3);
        }
        .btn-outline {
            background: #fff;
            border: 2px solid #e07b3c;
            color: #e07b3c;
            box-shadow: none;
        }
        .flex-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            align-items: center;
        }

        /* ========== 错题统计面板 ========== */
        .stats-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            margin: 0.6rem 0;
        }
        .stat-tag {
            background: #fff5ea;
            padding: 0.3rem 0.7rem;
            border-radius: 12px;
            font-size: 0.7rem;
            color: #5c3418;
            font-weight: 500;
            border: 1px solid #f0dcc0;
        }
        .stat-tag.has-error {
            background: #fef0ef;
            color: #c0392b;
            font-weight: 700;
            border-color: #e74c3c;
        }
        .stat-tag.total-tag {
            background: #e07b3c;
            color: #fff;
            border-color: #e07b3c;
            font-weight: 700;
        }

        /* 庆祝动画 */
        .celebrate {
            text-align: center;
            padding: 1rem;
            animation: celebrateAnim 0.6s ease;
        }
        @keyframes celebrateAnim {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }
            50% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        h3 {
            color: #5c3418;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            font-family: var(--font-serif);
        }

        /* 小屏幕优化 */
        @media (max-width: 380px) {
            .q-text {
                font-size: 0.82rem;
            }
            .option-label {
                font-size: 0.78rem;
                padding: 0.45rem 0.5rem;
                gap: 0.35rem;
            }
            .btn {
                padding: 0.45rem 1rem;
                font-size: 0.78rem;
                min-height: 36px;
            }
            .section-header {
                font-size: 0.85rem;
                padding: 0.65rem 0.8rem;
            }
        }
    </style>
</head>
<body>

    <!-- 头部 -->
    <div class="app-header">
        <span class="header-emoji">📜</span>
        <h1>东东的历史题库</h1>
        <div class="subtitle">广东中考 · 专项突破 · 材料映射法</div>
    </div>

    <!-- 主内容 -->
    <div class="main-content">
        <div id="view-quiz" class="view active"></div>
        <div id="view-material" class="view"></div>
        <div id="view-errors" class="view"></div>
    </div>

    <!-- 底部导航 -->
    <div class="bottom-nav">
        <div class="nav-item active" data-view="quiz">
            <span class="icon">📚</span>题库
        </div>
        <div class="nav-item" data-view="material">
            <span class="icon">📜</span>材料题
        </div>
        <div class="nav-item" data-view="errors">
            <span class="icon">📝</span>错题本
            <span class="badge-count" id="error-badge" style="display:none;">0</span>
        </div>
    </div>

    <script>
        (function() {
            // ==================== 完整题库数据 ====================
            // 真实题目库（每题都有完整数据）
            const realQuestions = {
                '中国古代史': [
                    { text: '考古学家在云南发现了距今约170万年的元谋人遗址，这证明我国', options: ['A. 是人类唯一起源地',
                            'B. 是人类最早起源地之一', 'C. 文明史从元谋人开始', 'D. 元谋人是现代中国人直系祖先'
                        ], correct: 1,
                        explanation: '元谋人遗址证明中国是人类起源的重要地区之一，但并非唯一或最早。' },
                    { text: '西周实行分封制，受封的诸侯对天子的义务包括', options: ['A. 定期朝贡、提供军赋',
                            'B. 独立外交、自立法令', 'C. 世袭罔替、永不削藩', 'D. 自行铸币、征收关税'
                        ], correct: 0,
                    explanation: '诸侯需定期朝觐天子、缴纳贡赋、提供军队，但内政有一定自主权。' },
                    { text: '秦始皇统一文字后，全国使用的标准字体是', options: ['A. 甲骨文', 'B. 金文', 'C. 小篆',
                            'D. 隶书'
                        ], correct: 2, explanation: '秦始皇命李斯统一文字为小篆，后隶书逐渐流行。' },
                    { text: '汉武帝时期，派张骞出使西域的主要目的是', options: ['A. 开辟丝绸之路经商', 'B. 联络大月氏夹击匈奴',
                            'C. 传播佛教文化', 'D. 寻找长生不老药'], correct: 1,
                        explanation: '张骞出使西域的直接目的是联合大月氏共同对抗匈奴。' },
                    { text: '魏晋南北朝时期，江南地区得以开发的主要原因是', options: ['A. 北方人口大量南迁', 'B. 南方自然条件优越',
                            'C. 南方战乱较少', 'D. 以上都是'], correct: 3,
                        explanation: '北人南迁带来了劳动力和先进技术，加上南方自然条件好、相对安定，共同促进了江南开发。' },
                    { text: '唐代实行三省六部制，其中负责执行政令的是', options: ['A. 中书省', 'B. 门下省', 'C. 尚书省',
                            'D. 枢密院'
                        ], correct: 2, explanation: '尚书省下设六部，负责执行中书省起草、门下省审核后的政令。' },
                    { text: '北宋时期出现的世界上最早的纸币是', options: ['A. 交子', 'B. 会子', 'C. 银票', 'D. 宝钞'],
                        correct: 0, explanation: '北宋四川地区出现的"交子"是世界上最早的纸币。' },
                    { text: '郑和下西洋最远到达的地区是', options: ['A. 东南亚', 'B. 印度半岛', 'C. 阿拉伯半岛',
                        'D. 非洲东海岸和红海沿岸'], correct: 3, explanation: '郑和船队最远到达非洲东海岸和红海沿岸。' },
                    { text: '清朝雍正时期设立的加强皇权的机构是', options: ['A. 内阁', 'B. 军机处', 'C. 南书房',
                    'D. 议政王大臣会议'], correct: 1, explanation: '雍正帝设立军机处，标志着君主专制达到顶峰。' },
                    { text: '我国现存最早的一部完整的农书是', options: ['A. 《齐民要术》', 'B. 《天工开物》', 'C. 《农政全书》',
                            'D. 《本草纲目》'], correct: 0, explanation: '贾思勰的《齐民要术》是我国现存最早最完整的农书。' },
                ],
                '中国近代史': [
                    { text: '鸦片战争爆发的根本原因是', options: ['A. 林则徐虎门销烟', 'B. 英国企图打开中国市场',
                            'C. 中英之间的贸易纠纷', 'D. 清政府的闭关锁国政策'], correct: 1,
                        explanation: '根本原因是英国工业革命后急需扩大海外市场和原料产地，虎门销烟只是导火索。' },
                    { text: '《南京条约》中开放的通商口岸位于广东的是', options: ['A. 上海', 'B. 宁波', 'C. 广州',
                        'D. 福州'], correct: 2, explanation: '《南京条约》开放广州、厦门、福州、宁波、上海五口，广州在广东。' },
                    { text: '洋务运动的口号是', options: ['A. 师夷长技以制夷', 'B. 自强、求富', 'C. 变法图强', 'D. 民主共和'],
                        correct: 1, explanation: '洋务运动前期口号"自强"，后期"求富"，创办军事和民用工业。' },
                    { text: '戊戌变法的代表人物包括', options: ['A. 李鸿章、张之洞', 'B. 康有为、梁启超', 'C. 孙中山、黄兴',
                            'D. 陈独秀、李大钊'], correct: 1, explanation: '康有为、梁启超是维新派代表人物，领导了戊戌变法。' },
                    { text: '辛亥革命的历史意义在于', options: ['A. 结束了中国两千多年的封建帝制', 'B. 完成了反帝反封建的任务',
                            'C. 实现了民族独立', 'D. 建立了社会主义制度'], correct: 0,
                        explanation: '辛亥革命推翻了清王朝，结束了君主专制制度，但未完成反帝反封建任务。' },
                    { text: '新文化运动的两大口号是', options: ['A. 自强与求富', 'B. 民主与科学', 'C. 自由与平等',
                        'D. 博爱与平等'], correct: 1, explanation: '新文化运动高举"民主"与"科学"两面旗帜。' },
                    { text: '五四运动爆发的直接原因是', options: ['A. 北洋军阀的黑暗统治', 'B. 巴黎和会上中国外交的失败',

                });
            }

            function renderQuestionCard(q) {
                const result = questionResults[q.id];
                let cardClass = '';
                if (result === 'correct') cardClass = 'correct-card';
                if (result === 'wrong') cardClass = 'wrong-card';
                const selected = userAnswers[q.id];
                let optionsHtml = q.options.map((opt, i) => {
                    let optClass = '';
                    if (result && i === q.correct) optClass = 'correct-answer';
                    if (result === 'wrong' && i === selected && i !== q.correct) optClass = 'wrong-answer';
                    if (!result && i === selected) optClass = 'selected';
                    const checked = (i === selected) ? 'checked' : '';
                    const disabled = result ? 'disabled' : '';
                    return `
                <label class="option-label ${optClass}" data-qid="${q.id}" data-optindex="${i}">
                  <input type="radio" name="q${q.id}" value="${i}" ${checked} ${disabled}> ${opt}
                </label>`;
                }).join('');

                let feedbackHtml = '';
                if (result === 'correct') {
                    feedbackHtml =
                        `<div class="feedback-msg correct-fb show"><span class="encourage">${randomPick(encourageCorrect)}</span> ${q.explanation}</div>`;
                } else if (result === 'wrong') {
                    const correctLetter = q.options[q.correct].charAt(0);
                    feedbackHtml =
                        `<div class="feedback-msg wrong-fb show"><span class="encourage">${randomPick(encourageWrong)}</span> 正确答案：${correctLetter}。${q.explanation}</div>`;
                }

                return `
              <div class="question-card ${cardClass}" data-qid="${q.id}">
                <div class="q-text">${q.text}</div>
                ${optionsHtml}
                ${feedbackHtml}
              </div>`;
            }

            function handleChoiceAnswer(qId, optIndex) {
                const question = findQuestionById(qId);
                if (!question) return;
                userAnswers[qId] = optIndex;
                if (optIndex === question.correct) {
                    questionResults[qId] = 'correct';
                } else {
                    questionResults[qId] = 'wrong';
                    errorSet.add(qId);
                    saveErrors();
                }
                renderQuizView();
                updateErrorBadge();
            }

            // ==================== 材料题视图 ====================
            function renderMaterialView() {
                const container = document.getElementById('view-material');
                if (!container) return;
                let html =
                    '<h3 style="margin-bottom:0.8rem;color:#5c3418;text-align:center;">📜 材料解析大题（环节式·可多选）</h3>';
                materialQuestions.forEach((mat) => {
                    const state = materialStates[mat.id] || { currentStep: 0, stepAnswers: {}, completed: false };
                    materialStates[mat.id] = state;
                    const step = mat.steps[state.currentStep];
                    const isCompleted = state.completed;
                    html += `
                <div class="section-card">
                  <div class="section-header" style="cursor:default;background:#fff8f0;">${mat.title}</div>
                  <div class="section-body show">
                    <div class="material-box">${mat.material.replace(/\n/g, '<br>')}</div>
                    ${isCompleted ? '<div style="color:#2d8a4e;font-weight:700;text-align:center;padding:0.5rem;" class="celebrate">🎉 本题已完成！三环节全部通过！</div>' : ''}
                    ${!isCompleted ? `
                      <div class="step-badge">${step.label}</div>
                      <div class="q-text">${step.question}</div>
                      <div class="step-options" data-matid="${mat.id}" data-step="${state.currentStep}">
                        ${step.options.map((opt, i) => {
                          const stepAns = state.stepAnswers[state.currentStep] || [];
                          const checked = stepAns.includes(i) ? 'checked' : '';
                          return `
                            <label class="option-label ${stepAns.includes(i)?'selected':''}" data-matid="${mat.id}" data-step="${state.currentStep}" data-optindex="${i}">
                              <input type="${step.type==='multi'?'checkbox':'radio'}" name="mat${mat.id}step${state.currentStep}" value="${i}" ${checked}> ${opt}
                            </label>`;
                        }).join('')}
                      </div>
                      <button class="btn" data-mat-submit="${mat.id}" style="margin-top:0.5rem;">✅ 提交本环节</button>
                      <div class="feedback-msg" id="mat-feedback-${mat.id}"></div>
                    ` : ''}
                  </div>
                </div>`;
                });
                container.innerHTML = html;

                // 绑定选项
                container.querySelectorAll('.step-options .option-label').forEach(label => {
                    label.addEventListener('click', function(e) {
                        const matId = this.dataset.matid;
                        const step = parseInt(this.dataset.step);
                        const optIndex = parseInt(this.dataset.optindex);
                        const state = materialStates[matId];
                        if (!state || state.completed) return;
                        const mat = materialQuestions.find(m => m.id === matId);
                        const stepData = mat.steps[step];
                        if (!state.stepAnswers[step]) state.stepAnswers[step] = [];
                        if (stepData.type === 'single') {
                            state.stepAnswers[step] = [optIndex];
                            const parent = this.parentElement;
                            parent.querySelectorAll('.option-label').forEach(l => l.classList.remove(
                                'selected'));
                            parent.querySelectorAll('input[type="radio"]').forEach(inp => {
                                inp.checked = (parseInt(inp.value) === optIndex);
                            });
                            this.classList.add('selected');
                        } else {
                            const idx = state.stepAnswers[step].indexOf(optIndex);
                            if (idx > -1) {
                                state.stepAnswers[step].splice(idx, 1);
                                this.classList.remove('selected');
                                this.querySelector('input').checked = false;
                            } else {
                                state.stepAnswers[step].push(optIndex);
                                this.classList.add('selected');
                                this.querySelector('input').checked = true;
                            }
                        }
                    });
                });

                // 绑定提交
                container.querySelectorAll('[data-mat-submit]').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const matId = this.dataset.matSubmit;
                        handleMaterialSubmit(matId);
                    });
                });
            }

            function handleMaterialSubmit(matId) {
                const mat = materialQuestions.find(m => m.id === matId);
                const state = materialStates[matId];
                if (!mat || !state || state.completed) return;
                const step = mat.steps[state.currentStep];
                const userAns = state.stepAnswers[state.currentStep] || [];
                if (userAns.length === 0) {
                    alert('请先选择答案！📝');
                    return;
                }
                const correctAns = [...step.correct].sort().join(',');
                const userAnsSorted = [...userAns].sort().join(',');
                const isCorrect = (correctAns === userAnsSorted);
                const fbDiv = document.getElementById(`mat-feedback-${matId}`);
                if (fbDiv) {
                    if (isCorrect) {
                        fbDiv.className = 'feedback-msg correct-fb show';
                        fbDiv.innerHTML =
                            `<span class="encourage">${randomPick(encourageCorrect)}</span> ${step.explanation}`;
                    } else {
                        fbDiv.className = 'feedback-msg wrong-fb show';
                        const correctLetters = step.correct.map(i => step.options[i].charAt(0)).join('、');
                        fbDiv.innerHTML =
                            `<span class="encourage">${randomPick(encourageWrong)}</span> 正确答案涉及：${correctLetters}。${step.explanation}`;
                    }
                }
                if (state.currentStep < mat.steps.length - 1) {
                    state.currentStep++;
                    setTimeout(() => renderMaterialView(), 900);
                } else {
                    state.completed = true;
                    setTimeout(() => renderMaterialView(), 900);
                }
            }

            // ==================== 错题本视图 ====================
            function renderErrorView() {
                const container = document.getElementById('view-errors');
                if (!container) return;
                const errorIds = [...errorSet];
                const statsMap = {};
                quizData.forEach(section => { statsMap[section.id] = { title: section.title, count: 0 }; });
                errorIds.forEach(qId => {
                    const q = findQuestionById(qId);
                    if (q) {
                        const section = quizData.find(s => s.questions.some(qq => qq.id === qId));
                        if (section && statsMap[section.id]) statsMap[section.id].count++;
                    }
                });

                let html =
                    '<h3 style="margin-bottom:0.6rem;color:#5c3418;text-align:center;">📝 错题本（答对后自动移除）</h3>';
                html += '<div class="stats-panel">';
                for (const [key, val] of Object.entries(statsMap)) {
                    if (val.count > 0 || errorIds.length === 0) {
                        html +=
                            `<span class="stat-tag ${val.count>0?'has-error':''}">${val.title}：${val.count}题</span>`;
                    }
                }
                html += `<span class="stat-tag total-tag">总计：${errorIds.length}题</span>`;
                html += '</div>';

                if (errorIds.length === 0) {
                    html +=
                        '<div class="celebrate" style="text-align:center;padding:2rem;color:#2d8a4e;font-weight:700;font-size:1.1rem;">🎉 错题本已清空！<br>' +
                        randomPick(encourageClearErrors) + '</div>';
                } else {
                    html += '<div id="error-questions">';
                    errorIds.forEach(qId => {
                        const q = findQuestionById(qId);
                        if (q) html += renderErrorQuestionCard(q);
                    });
                    html += '</div>';
                }
                container.innerHTML = html;

                container.querySelectorAll('.error-option-label').forEach(label => {
                    label.addEventListener('click', function() {
                        const qId = this.dataset.qid;
                        const optIndex = parseInt(this.dataset.optindex);
                        handleErrorAnswer(qId, optIndex, this.closest('.question-card'));
                    });
                });
            }

            function renderErrorQuestionCard(q) {
                const optionsHtml = q.options.map((opt, i) => {
                    return `
                <label class="option-label error-option-label" data-qid="${q.id}" data-optindex="${i}">
                  <input type="radio" name="err${q.id}" value="${i}"> ${opt}
                </label>`;
                }).join('');
                return `
              <div class="question-card" data-qid="${q.id}">
                <div class="q-text">${q.text}</div>
                ${optionsHtml}
                <div class="feedback-msg" id="err-fb-${q.id}"></div>
              </div>`;
            }

            function handleErrorAnswer(qId, optIndex, card) {
                const q = findQuestionById(qId);
                if (!q) return;
                const fbDiv = document.getElementById(`err-fb-${qId}`);
                if (optIndex === q.correct) {
                    errorSet.delete(qId);
                    saveErrors();
                    if (fbDiv) {
                        fbDiv.className = 'feedback-msg correct-fb show';
                        fbDiv.innerHTML =
                            `<span class="encourage">${randomPick(encourageCorrect)}</span> 已从错题本移除！${q.explanation}`;
                    }
                    card.querySelectorAll('.option-label').forEach(l => {
                        if (parseInt(l.dataset.optindex) === q.correct) l.classList.add('correct-answer');
                    });
                    card.querySelectorAll('input').forEach(inp => inp.disabled = true);
                    setTimeout(() => renderErrorView(), 1200);
                } else {
                    if (fbDiv) {
                        fbDiv.className = 'feedback-msg wrong-fb show';
                        fbDiv.innerHTML =
                            `<span class="encourage">${randomPick(encourageWrong)}</span> 正确答案：${q.options[q.correct].charAt(0)}。${q.explanation}`;
                    }
                    card.querySelectorAll('.option-label').forEach(l => {
                        if (parseInt(l.dataset.optindex) === q.correct) l.classList.add('correct-answer');
                        if (parseInt(l.dataset.optindex) === optIndex && optIndex !== q.correct) l.classList
                            .add('wrong-answer');
                    });
                    card.querySelectorAll('input').forEach(inp => inp.disabled = true);
                }
                updateErrorBadge();
            }

            // ==================== 导航事件 ====================
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', function() {
                    const view = this.dataset.view;
                    switchView(view);
                });
            });

            // ==================== 初始化 ====================
            function init() {
                quizData.forEach(s => { expandedSections[s.id] = true; });
                updateErrorBadge();
                switchView('quiz');
                console.log('📜 东东的历史题库 已就绪！');
                console.log('📚 选择题总量：', quizData.reduce((sum, s) => sum + s.questions.length, 0), '题');
                console.log('📜 材料题：', materialQuestions.length, '题（每题3环节）');
                console.log('📝 错题本：', errorSet.size, '题');
            }
            init();
        })();
    </script>
</body>
</html>
